<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="fcard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#333b4b" />
      <stop offset="100%" stop-color="#1d2230" />
    </linearGradient>
    <pattern id="fweave" width="30" height="30" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="30" height="30" fill="none" />
      <rect width="13" height="30" fill="#3ddc84" opacity="0.5" />
    </pattern>
    <clipPath id="fclip">
      <rect x="-130" y="-168" width="260" height="336" rx="30" ry="30" />
    </clipPath>
  </defs>

  <!-- dark rounded tile so it reads on light OR dark browser tabs -->
  <rect width="512" height="512" rx="104" fill="#0d0f13" />

  <!-- one bold, slightly tilted card back -->
  <g transform="translate(256 256) rotate(-11)">
    <rect x="-130" y="-168" width="260" height="336" rx="30" fill="url(#fcard)" />
    <g clip-path="url(#fclip)">
      <rect x="-130" y="-168" width="260" height="336" fill="url(#fweave)" />
    </g>
    <rect x="-130" y="-168" width="260" height="336" rx="30" fill="none"
      stroke="rgba(255,255,255,0.16)" stroke-width="6" />
    <rect x="-116" y="-154" width="232" height="308" rx="20" fill="none"
      stroke="#3ddc84" stroke-width="5" opacity="0.8" />
    <!-- bold central brand "B" medallion -->
    <rect x="-54" y="-54" width="108" height="108" rx="26" fill="#3ddc84" />
    <text x="0" y="3" text-anchor="middle" dominant-baseline="central"
      font-family="'Hanken Grotesk', system-ui, -apple-system, 'Segoe UI', sans-serif"
      font-weight="800" font-size="86" fill="#06120c">B</text>
  </g>
</svg>
