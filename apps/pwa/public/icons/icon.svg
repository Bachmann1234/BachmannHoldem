<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="80%">
      <stop offset="0%" stop-color="#171c24" />
      <stop offset="100%" stop-color="#0b0e13" />
    </radialGradient>
    <linearGradient id="cardFront" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c3340" />
      <stop offset="100%" stop-color="#191d27" />
    </linearGradient>
    <linearGradient id="cardBehind" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#222732" />
      <stop offset="100%" stop-color="#13171f" />
    </linearGradient>
    <pattern id="weave" width="13" height="13" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="13" height="13" fill="none" />
      <rect width="5" height="13" fill="#3ddc84" opacity="0.32" />
    </pattern>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.55" />
    </filter>
    <clipPath id="frontClip">
      <rect x="-100" y="-140" width="200" height="280" rx="22" ry="22" />
    </clipPath>
  </defs>

  <rect width="512" height="512" fill="url(#bg)" />

  <!-- card behind: a "deck" peeking upper-left -->
  <g transform="translate(232 244) rotate(-26)">
    <rect x="-100" y="-140" width="200" height="280" rx="22" fill="url(#cardBehind)"
      stroke="rgba(255,255,255,0.07)" stroke-width="2" />
  </g>

  <!-- front card, tilted -->
  <g transform="translate(268 262) rotate(-13)" filter="url(#shadow)">
    <rect x="-100" y="-140" width="200" height="280" rx="22" fill="url(#cardFront)" />
    <g clip-path="url(#frontClip)">
      <rect x="-100" y="-140" width="200" height="280" fill="url(#weave)" />
    </g>
    <rect x="-100" y="-140" width="200" height="280" rx="22" fill="none"
      stroke="rgba(255,255,255,0.14)" stroke-width="3" />
    <rect x="-89" y="-129" width="178" height="258" rx="15" fill="none"
      stroke="rgba(61,220,132,0.5)" stroke-width="2" />
    <!-- central brand medallion: the green "B" mark (matches the in-app logo) -->
    <rect x="-37" y="-37" width="74" height="74" rx="18" fill="#3ddc84" />
    <text x="0" y="2" text-anchor="middle" dominant-baseline="central"
      font-family="'Hanken Grotesk', system-ui, -apple-system, 'Segoe UI', sans-serif"
      font-weight="800" font-size="58" fill="#06120c">B</text>
  </g>
</svg>
