name: CI

# Runs the same `verify` suite the local pre-push hook runs. Once this repo is on GitHub,
# enable branch protection on `main` and mark this job "Required" to truly block merges.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm verify
