name: Deploy PWA

# Deploys apps/pwa to Cloudflare Pages on every push to main (and on demand). It re-runs the full
# `verify` gate first, so only a green tree ships — the build is never published on a red commit.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — a token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
# And a one-time Cloudflare Pages project named `bachmann-holdem` (Direct Upload / Wrangler), which
# serves at https://bachmann-holdem.pages.dev. See README "Deploy" for the exact setup steps.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys race; a newer push supersedes an in-flight one.
concurrency:
  group: deploy-pwa
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Only a green tree ships — same gate as CI and the pre-push hook.
      - run: pnpm verify

      - run: pnpm --filter @holdem/pwa build

      # Run wrangler via `pnpm dlx` rather than cloudflare/wrangler-action: the action shells out to
      # `pnpm add wrangler` at the repo root, which pnpm refuses in a workspace
      # (ERR_PNPM_ADDING_TO_ROOT). `pnpm dlx` fetches wrangler ephemerally — no root install, no
      # lockfile churn. The project is created on first run if it doesn't exist yet (idempotent).
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm dlx wrangler@4 pages project create bachmann-holdem --production-branch=main 2>/dev/null || true
          pnpm dlx wrangler@4 pages deploy apps/pwa/dist --project-name=bachmann-holdem --branch=main
