<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Foundations Primer — M4.5 design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="primer.css" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #f0eee9;
      }
      /* let the canvas (not the M4 table shell) own scroll/overflow */
      body {
        overflow: hidden;
      }
    </style>
  </head>
  <!-- Locked M4 direction: playful (warm felt glow, rounded, accent-forward) + four-colour deck -->
  <body data-dir="playful" data-deck="four">
    <div id="root"></div>

    <template id="__bundler_thumbnail">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
        <rect width="100" height="100" fill="#0d0f13" />
        <circle cx="50" cy="42" r="16" fill="#3ddc84" />
        <path d="M44 42l4 4 8-9" stroke="#06120c" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />
        <rect x="30" y="66" width="40" height="6" rx="3" fill="#3ddc84" opacity="0.85" />
      </svg>
    </template>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>

    <!-- content + grading data (plain JS) -->
    <script src="curriculum.js"></script>
    <!-- primitives → screens → app → canvas (each exports to window) -->
    <script type="text/babel" src="components.jsx"></script>
    <script type="text/babel" src="screens.jsx"></script>
    <script type="text/babel" src="primer-app.jsx"></script>
    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel" src="canvas.jsx"></script>
  </body>
</html>
